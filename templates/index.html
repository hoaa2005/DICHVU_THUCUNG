<!doctype html>
<html lang="vi" class="h-full">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PetCare - Đăng nhập hệ thống</title>
  <script src="https://cdn.tailwindcss.com/3.4.17"></script>
  <script src="https://cdn.jsdelivr.net/npm/lucide@0.263.0/dist/umd/lucide.min.js"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
  <style>
    * { font-family: 'Nunito', sans-serif; }
    .form-slide { transition: transform 0.5s cubic-bezier(.4,0,.2,1), opacity 0.4s ease; }
    input:focus { outline: none; box-shadow: 0 0 0 3px rgba(100,180,220,0.4); }
    .btn-primary { transition: all 0.25s ease; }
    .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 6px 20px rgba(100,180,220,0.4); }
    .btn-primary:active { transform: translateY(0); }
    .tab-active { background: #64b4dc; color: #fff; }
    .tab-inactive { background: transparent; color: #4a9cd4; }
    .tab-inactive:hover { background: rgba(100,180,220,0.15); }
    .input-field { transition: border-color 0.2s ease, box-shadow 0.2s ease; }
  </style>
</head>
<body class="h-full w-full" style="background: linear-gradient(145deg, #e0f4ff 0%, #d0ebff 30%, #c5e3ff 60%, #b8d9ff 100%);">
  <main class="h-full w-full flex items-center justify-center p-4 overflow-auto">
   <div class="w-full max-w-md relative">
    <div class="relative bg-white rounded-3xl shadow-xl overflow-hidden" style="box-shadow: 0 20px 60px rgba(100,180,220,0.2);">
      
      <div class="text-center pt-8 pb-4 px-6" style="background: linear-gradient(180deg, rgba(100,180,220,0.12) 0%, transparent 100%);">
        <h1 id="brandName" class="text-2xl font-extrabold" style="color: #2c5aa0;">PetCare</h1>
        <p id="tagline" class="text-sm mt-1" style="color: #5f8cb8;">Yêu thương thú cưng của bạn</p>
      </div>

      <div class="flex mx-6 mt-2 rounded-full p-1" style="background: rgba(100,180,220,0.12);">
        <button id="tabLogin" onclick="switchTab('login')" class="flex-1 py-2.5 rounded-full text-sm font-bold transition-all duration-300 tab-active"> Đăng nhập </button> 
        <button id="tabRegister" onclick="switchTab('register')" class="flex-1 py-2.5 rounded-full text-sm font-bold transition-all duration-300 tab-inactive"> Đăng ký </button>
      </div>

      <div class="relative overflow-y-auto" style="min-height: 420px; max-height: 600px;">
        <form id="loginForm" class="form-slide absolute inset-0 px-6 pt-6 pb-6" onsubmit="handleLogin(event)">
         <div class="space-y-5">
          <div>
           <label for="loginUser" class="block text-sm font-semibold mb-1.5" style="color: #3d7aa8;">Tên đăng nhập</label> 
           <input id="loginUser" type="text" class="input-field w-full px-4 py-3 rounded-xl border-2 text-sm" style="border-color: #d0ebff; color: #2c5aa0;" placeholder="Nhập tài khoản quản trị hoặc user" required>
          </div>
          <div>
           <label for="loginPass" class="block text-sm font-semibold mb-1.5" style="color: #3d7aa8;">Mật khẩu</label> 
           <input id="loginPass" type="password" class="input-field w-full px-4 py-3 rounded-xl border-2 text-sm" style="border-color: #d0ebff; color: #2c5aa0;" placeholder="••••••••" required>
          </div>
          <div class="flex items-center justify-between text-xs">
           <label class="flex items-center gap-1.5 cursor-pointer" style="color: #5f8cb8;"> <input type="checkbox" class="rounded accent-blue-400"> Ghi nhớ </label> 
           <a href="#" class="font-semibold hover:underline" style="color: #5f8cb8;">Quên mật khẩu?</a>
          </div>
          <button id="loginBtn" type="submit" class="btn-primary w-full py-3 rounded-xl font-bold text-white text-sm shadow-md" style="background: linear-gradient(135deg, #64b4dc, #4a9cd4);"> Đăng nhập </button>
         </div>
        </form>

        <form id="registerForm" class="form-slide absolute inset-0 px-6 pt-6 pb-6" style="transform: translateX(100%); opacity: 0;" onsubmit="handleRegister(event)">
         <div class="space-y-4">
          <div>
           <label for="regName" class="block text-sm font-semibold mb-1.5" style="color: #3d7aa8;">Họ và tên</label> 
           <input id="regName" type="text" class="input-field w-full px-4 py-3 rounded-xl border-2 text-sm" style="border-color: #d0ebff; color: #2c5aa0;" required>
          </div>
          <div>
           <label for="regEmail" class="block text-sm font-semibold mb-1.5" style="color: #3d7aa8;">Email</label> 
           <input id="regEmail" type="email" class="input-field w-full px-4 py-3 rounded-xl border-2 text-sm" style="border-color: #d0ebff; color: #2c5aa0;" required>
          </div>
          <div>
           <label for="regPhone" class="block text-sm font-semibold mb-1.5" style="color: #3d7aa8;">Số điện thoại</label> 
           <input id="regPhone" type="tel" class="input-field w-full px-4 py-3 rounded-xl border-2 text-sm" style="border-color: #d0ebff; color: #2c5aa0;" required>
          </div>
          <div>
           <label for="regPass" class="block text-sm font-semibold mb-1.5" style="color: #3d7aa8;">Mật khẩu</label> 
           <input id="regPass" type="password" class="input-field w-full px-4 py-3 rounded-xl border-2 text-sm" style="border-color: #d0ebff; color: #2c5aa0;" required>
          </div>
          <button id="registerBtn" type="submit" class="btn-primary w-full py-3 rounded-xl font-bold text-white text-sm" style="background: linear-gradient(135deg, #64b4dc, #4a9cd4);"> Đăng ký </button>
         </div>
        </form>
       </div>

       <div id="toast" class="fixed top-4 left-1/2 -translate-x-1/2 px-5 py-3 rounded-2xl text-sm font-bold text-white shadow-lg transition-all duration-300 opacity-0 pointer-events-none" style="background: linear-gradient(135deg, #2c5aa0, #4a9cd4); transform: translate(-50%, -12px); z-index: 50;"></div>
    </div>
   </div>
  </main>

  <script>
    function switchTab(tab) {
      const loginForm = document.getElementById('loginForm');
      const registerForm = document.getElementById('registerForm');
      const tabLogin = document.getElementById('tabLogin');
      const tabRegister = document.getElementById('tabRegister');

      if (tab === 'login') {
        loginForm.style.transform = 'translateX(0)'; loginForm.style.opacity = '1';
        registerForm.style.transform = 'translateX(100%)'; registerForm.style.opacity = '0';
        tabLogin.className = 'flex-1 py-2.5 rounded-full text-sm font-bold transition-all duration-300 tab-active';
        tabRegister.className = 'flex-1 py-2.5 rounded-full text-sm font-bold transition-all duration-300 tab-inactive';
      } else {
        loginForm.style.transform = 'translateX(-100%)'; loginForm.style.opacity = '0';
        registerForm.style.transform = 'translateX(0)'; registerForm.style.opacity = '1';
        tabRegister.className = 'flex-1 py-2.5 rounded-full text-sm font-bold transition-all duration-300 tab-active';
        tabLogin.className = 'flex-1 py-2.5 rounded-full text-sm font-bold transition-all duration-300 tab-inactive';
      }
    }

    function showToast(msg) {
      const t = document.getElementById('toast');
      t.textContent = msg;
      t.style.opacity = '1'; t.style.transform = 'translate(-50%, 0)';
      setTimeout(() => { t.style.opacity = '0'; t.style.transform = 'translate(-50%, -12px)'; }, 2500);
    }

    function handleLogin(e) {
      e.preventDefault();
      const username = document.getElementById('loginUser').value;
      const loginPass = document.getElementById('loginPass').value;

      fetch('/login', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ username: username, password: loginPass })
      })
      .then(res => res.json())
      .then(data => {
        if (data.status === 'success') {
          showToast('🐾 ' + data.message);
          setTimeout(() => { window.location.href = data.redirect; }, 800);
        } else {
          showToast('❌ ' + data.message);
        }
      })
      .catch(err => {
        showToast('❌ Lỗi kết nối máy chủ!');
      });
    }

    function handleRegister(e) {
      e.preventDefault();
      showToast('🐾 Chức năng đăng ký đang bảo trì.');
    }

    lucide.createIcons();
  </script>
</body>
</html>
